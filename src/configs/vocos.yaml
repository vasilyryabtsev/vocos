defaults:
  - model: vocos
  - writer: cometml
  - metrics: empty_metrics
  - datasets: ruslan
  - dataloader: example
  - transforms.instance_transforms: vocos
  - _self_

# Writer
writer:
  run_name: "train"

# Generator optimizer
optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-4
  betas: [0.9, 0.999]

lr_scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${trainer.n_epochs} * ${trainer.epoch_len}
  eta_min: 1e-6

# Discriminator optimizer
optimizer_d:
  _target_: torch.optim.AdamW
  lr: 2e-4
  betas: [0.9, 0.999]

lr_scheduler_d:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${trainer.n_epochs} * ${trainer.epoch_len}
  eta_min: 1e-6

# Loss
loss_function:
  _target_: src.loss.MelSpecReconstructionLoss
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  n_mels: 80

# Discriminators
discriminator_mpd:
  _target_: src.model.MultiPeriodDiscriminator
  periods: [2, 3, 5, 7, 11]

discriminator_mrd:
  _target_: src.model.MultiResolutionDiscriminator
  fft_sizes: [2048, 1024, 512]

# Trainer
trainer:
  trainer_class: VocosTrainer
  mel_loss_coeff: 45.0
  feat_loss_coeff: 2.0
  log_step: 50
  n_epochs: 100
  epoch_len: 10000  # 100 * 10000 = 1M iters (1M G + 1M D updates)
  device_tensors: ["spectrogram", "audio"]
  resume_from: null
  device: auto
  override: False
  monitor: "min val_loss"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 1
  max_grad_norm: 10.0

# Dataloader overrides
dataloader:
  batch_size: 16
  num_workers: 4
